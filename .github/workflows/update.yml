name: Daily Wallpaper Generator

on:
  schedule:
    - cron: '0 20 * * *' # દરરોજ भारतीय वेळेनुसार रात्री 1:30 वाजता रन होईल (UTC 20:00)
  workflow_dispatch: # हे टाकल्यामुळे तू मॅन्युअली कधीही बटण दाबून रन करू शकतोस!

jobs:
  generate_wallpapers:
    runs-on: ubuntu-latest
    permissions:
      contents: write # इमेजेस सेव्ह करण्याची परमिशन
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install Pillow requests

      - name: Run Bhidu's Robot (bot.py)
        run: python bot.py

      - name: Commit and Push New Wallpapers
        run: |
          git config --global user.name "Wallpaper Bot"
          git config --global user.email "bot@wallpaper-app.com"
          git add .
          git commit -m "Auto-generated daily 200 wallpapers" || echo "No changes to commit"
          git push
